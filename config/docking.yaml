ga:
  source_compound_file: "datasets/final_seed_lipinski_top_fitness.csv"
  # Si source_compound_file termina en .csv, se usa esta columna.
  source_smiles_column: "SMILES"
  output_dir: "experiments/ga_run"
  # Crossover/Mutation siempre se ejecutan con AutoGrow.
  operator_backend: "autogrow"
  num_generations: 30
  top_k: 100
  crossover_budget: 20
  mutation_budget: 20
  crossover_attempts: 3
  mutation_children_limit: 0
  maximize_fitness: true
  random_seed: 7

autogrow:
  vars_file: "config/vars_mgltools_6eif.json"
  number_of_processors: -1
  multithread_mode: "multithreading"

reward:
  input_type: "smiles"
  results_output_dir: "experiments/ga_run/rewards"
  results_output_prefix: "reward_results"
  fail_on_error: true

  # Opciones de combiner soportadas:
  # - docking_only
  # - docking_logp
  # - docking_two
  # - docking_two_logp
  # - docking_two_qed
  combiner: "docking_two_qed"

  # Columnas parametrizables para combiners.
  docking_column: "Docking_6EIF"
  logp_column: "LogP"
  qed_column: "QED"
  docking_columns: ["Docking_6EIF", "Docking_7Q1P"]
  docking_alpha: 0.5
  docking_beta: 0.5

  providers:
    - name: "dock_6eif"
      type: "docking"
      script: "scripts/reward_mgltools_vina.py"
      vars_file: "config/vars_mgltools_6eif.json"
      smiles_output_file: "experiments/ga_run/tmp/smiles_6eif.smi"
      output_dir: "experiments/ga_run/tmp/6eif"
      output_prefix: "docking_results"
      output_column: "Docking_6EIF"

    - name: "dock_7q1p"
      type: "docking"
      script: "scripts/reward_mgltools_vina.py"
      vars_file: "config/vars_mgltools_7q1p.json"
      smiles_output_file: "experiments/ga_run/tmp/smiles_7q1p.smi"
      output_dir: "experiments/ga_run/tmp/7q1p"
      output_prefix: "docking_results"
      output_column: "Docking_7Q1P"

    # Provider de propiedades fisicoquimicas (LogP y MW)
    - name: "rdkit_props"
      type: "rdkit_props"